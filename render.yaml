databases:
  - name: jgive-db
    databaseName: jgive_production
    user: jgive
    plan: free

services:
  - type: web
    name: jgive-eliya
    env: ruby
    plan: free
    buildCommand: "bundle install && bundle exec rails db:migrate && bundle exec rails db:seed"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jgive-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
